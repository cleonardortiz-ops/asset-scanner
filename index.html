<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; margin: 0; }
        h2 { text-align: center; color: #333; }
        
        .store-selector {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        select, input {
            width: 100%;
            padding: 12px;
            margin: 5px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        #scanner { 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .gps-status {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .gps-fixed { background: #d4edda; color: #155724; }
        .gps-searching { background: #fff3cd; color: #856404; }
        .gps-error { background: #f8d7da; color: #721c24; }
        
        #result { 
            margin: 20px auto; 
            padding: 15px; 
            border-radius: 8px; 
            display: none; 
            max-width: 500px; 
        }
        
        .success { background: #d4edda; color: #155724; }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 15px 24px; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            display: block; 
            margin: 20px auto; 
            max-width: 500px; 
            width: 100%; 
        }
        
        .store-badge {
            background: #6c757d;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            display: inline-block;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>📱 Multi-Store Asset Scanner</h2>
    
    <!-- Store Selection -->
    <div class="store-selector">
        <label><strong>🏢 Select Store:</strong></label>
        <select id="storeSelect" onchange="updateStoreInfo()">
            <option value="">-- Choose Store --</option>
            <option value="STORE001|Downtown">Downtown Store</option>
            <option value="STORE002|Uptown">Uptown Store</option>
            <option value="STORE003|Eastside">Eastside Store</option>
            <option value="STORE004|Westside">Westside Store</option>
            <option value="custom">➕ Add Custom Store</option>
        </select>
        
        <div id="customStoreInput" style="display:none;">
            <input type="text" id="customStoreName" placeholder="Enter store name">
            <input type="text" id="customStoreId" placeholder="Store ID (optional)">
        </div>
    </div>
    
    <!-- GPS Status -->
    <div id="gpsStatus" class="gps-status gps-searching">
        <span>📍</span>
        <span id="gpsMessage">Getting location...</span>
    </div>
    
    <!-- Scanner -->
    <div id="scanner"></div>
    
    <!-- Scan Result -->
    <div id="result"></div>
    <button id="submitBtn" style="display:none;" onclick="submitScan()">✓ Submit Scan</button>
    <div id="status"></div>

    <script>
        // ===== CONFIGURATION =====
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
        // =========================
        
        let lastScannedData = null;
        let scanner = null;
        let currentLocation = null;
        let watchId = null;
        let currentStore = { id: '', name: '' };
        
        // Start GPS tracking
        function startGPS() {
            if (!navigator.geolocation) {
                updateGPSStatus('error', 'GPS not supported on this device');
                return;
            }
            
            updateGPSStatus('searching', 'Requesting location permission...');
            
            // Get high accuracy location
            watchId = navigator.geolocation.watchPosition(
                position => {
                    currentLocation = {
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: new Date(position.timestamp)
                    };
                    
                    updateGPSStatus('fixed', 
                        `📍 Location fixed (accuracy: ${Math.round(position.coords.accuracy)}m)<br>
                         <small>${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}</small>`
                    );
                },
                error => {
                    let message = 'GPS error: ';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message += 'Permission denied. Please enable location.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message += 'Location unavailable. Try again.';
                            break;
                        case error.TIMEOUT:
                            message += 'Location timeout. Try again.';
                            break;
                    }
                    updateGPSStatus('error', message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }
        
        function updateGPSStatus(type, message) {
            const statusDiv = document.getElementById('gpsStatus');
            const messageSpan = document.getElementById('gpsMessage');
            
            statusDiv.className = 'gps-status';
            if (type === 'fixed') {
                statusDiv.classList.add('gps-fixed');
            } else if (type === 'error') {
                statusDiv.classList.add('gps-error');
            } else {
                statusDiv.classList.add('gps-searching');
            }
            
            messageSpan.innerHTML = message;
        }
        
        function updateStoreInfo() {
            const select = document.getElementById('storeSelect');
            const customDiv = document.getElementById('customStoreInput');
            
            if (select.value === 'custom') {
                customDiv.style.display = 'block';
                currentStore = { id: '', name: '' };
            } else if (select.value) {
                customDiv.style.display = 'none';
                const [id, name] = select.value.split('|');
                currentStore = { id, name };
            } else {
                currentStore = { id: '', name: '' };
            }
        }
        
        // Scanner functions
        async function startScanner() {
            scanner = new Html5Qrcode("scanner");
            
            try {
                await scanner.start(
                    { facingMode: "environment" },
                    { 
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    onScanError
                );
            } catch (err) {
                console.error('Scanner error:', err);
                document.getElementById('status').innerHTML = '❌ Camera error: ' + err.message;
            }
        }
        
        function onScanSuccess(decodedText) {
            try {
                lastScannedData = JSON.parse(decodedText);
            } catch (e) {
                lastScannedData = { id: decodedText, name: '' };
            }
            
            // Check if store is selected
            if (!currentStore.id && !currentStore.name) {
                alert('⚠️ Please select a store first!');
                return;
            }
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').className = 'success';
            document.getElementById('result').innerHTML = 
                `<strong>✅ Scanned:</strong> ${lastScannedData.id || lastScannedData.id}<br>
                 <small>Store: ${currentStore.name || currentStore.id}</small>`;
            document.getElementById('submitBtn').style.display = 'block';
            
            // Optional: Stop scanner after successful scan
            if (scanner) {
                scanner.stop();
            }
        }
        
        function onScanError(error) {
            // Ignore most errors
            if (!error.includes('NotFoundException')) {
                console.warn(error);
            }
        }
        
        async function submitScan() {
            if (!lastScannedData || (!currentStore.id && !currentStore.name)) {
                alert('Please select a store and scan an asset first');
                return;
            }
            
            const scannedBy = prompt("Enter your name:", "");
            if (!scannedBy) return;
            
            const notes = prompt("Any notes? (optional):", "");
            
            // Get custom store info if needed
            let storeId = currentStore.id;
            let storeName = currentStore.name;
            
            if (document.getElementById('storeSelect').value === 'custom') {
                storeName = document.getElementById('customStoreName').value;
                storeId = document.getElementById('customStoreId').value || 'CUST_' + Date.now();
                if (!storeName) {
                    alert('Please enter store name');
                    return;
                }
            }
            
            // Prepare payload with all data
            const payload = {
                assetId: lastScannedData.id || lastScannedData.id,
                assetName: lastScannedData.name || '',
                scannedBy: scannedBy,
                storeId: storeId,
                storeName: storeName,
                location: storeName,
                latitude: currentLocation ? currentLocation.latitude : null,
                longitude: currentLocation ? currentLocation.longitude : null,
                accuracy: currentLocation ? currentLocation.accuracy : null,
                scanType: 'QR Code',
                deviceInfo: navigator.userAgent,
                notes: notes || '',
                timestamp: new Date().toISOString()
            };
            
            document.getElementById('status').innerHTML = '⏳ Submitting...';
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('status').innerHTML = `✅ Submitted to ${storeName} sheet!`;
                document.getElementById('result').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'none';
                lastScannedData = null;
                
                // Restart scanner
                setTimeout(() => {
                    startScanner();
                }, 2000);
                
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Error: ' + error.message;
                console.error('Submit error:', error);
            }
        }
        
        // Initialize
        window.onload = function() {
            startScanner();
            startGPS();
        };
        
        // Cleanup GPS on page unload
        window.onbeforeunload = function() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }
            if (scanner) {
                scanner.stop();
            }
        };
    </script>
</body>
</html>
