<!DOCTYPE html>
<html>
<head>
    <title>Sheet Connection Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        button { width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Google Sheets Connection Test</h2>
        
        <div>
            <label>Your Apps Script URL:</label>
            <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        
        <button onclick="testSimplePost()">🔍 Test Simple POST</button>
        <button onclick="testWithData()">📝 Test With Sample Data</button>
        
        <div id="result"></div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #666;">
            <p><strong>Instructions:</strong></p>
            <ol>
                <li>Paste your Apps Script Web App URL above</li>
                <li>Click "Test Simple POST" first</li>
                <li>Check your Google Sheet after each test</li>
            </ol>
        </div>
    </div>

    <script>
        function log(message, isError = false) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = isError ? 'error' : 'success';
            resultDiv.innerHTML = message;
            console.log(message);
        }

        async function testSimplePost() {
            const url = document.getElementById('scriptUrl').value.trim();
            
            if (!url) {
                log('❌ Please enter your Apps Script URL', true);
                return;
            }

            log('⏳ Testing connection...');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        test: 'connection',
                        timestamp: new Date().toISOString(),
                        message: 'Simple connection test'
                    })
                });

                log('✅ Test sent! Check your Google Sheet in 30 seconds.\n\nLook for a row with "test connection" in the Asset ID column.');
                
            } catch (error) {
                log('❌ Error: ' + error.message, true);
            }
        }

        async function testWithData() {
            const url = document.getElementById('scriptUrl').value.trim();
            
            if (!url) {
                log('❌ Please enter your Apps Script URL', true);
                return;
            }

            const testData = {
                assetId: 'TEST-' + Math.floor(Math.random() * 1000),
                assetName: 'Test Asset',
                scannedBy: 'Test User',
                storeId: 'TEST001',
                storeName: 'Test Store',
                location: 'Test Location',
                latitude: 40.7128,
                longitude: -74.0060,
                accuracy: 5,
                scanType: 'Test',
                notes: 'This is a test submission',
                timestamp: new Date().toISOString()
            };

            log('⏳ Sending test data: ' + JSON.stringify(testData, null, 2));

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(testData)
                });

                log('✅ Test data sent! Check your Google Sheet in 30 seconds.\n\nLook for Asset ID: ' + testData.assetId);
                
            } catch (error) {
                log('❌ Error: ' + error.message, true);
            }
        }
    </script>
</body>
</html>
